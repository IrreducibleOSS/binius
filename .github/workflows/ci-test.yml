name: Rust CI Test

on:
  pull_request:
    branches: [main]

jobs:
  pre-build:
    name: prebuild-amd
    runs-on: [self-hosted, c7a-2xlarge]
    container: rustlang/rust:nightly
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Command
        run: cargo build --tests --benches --examples
